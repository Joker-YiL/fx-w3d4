name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

defaults:
  run:
    working-directory: fx-app-spring

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: fx-app-spring/pom.xml
      - name: Verify
        run: mvn -B verify

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        shell: bash
        run: |
          set -euo pipefail
          SHORT="${GITHUB_SHA::7}"
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER}/fx-app-spring"
          docker build -t "$IMAGE:sha-$SHORT" -t "$IMAGE:latest" .
          docker push "$IMAGE:sha-$SHORT"
          docker push "$IMAGE:latest"

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy stand-in
        shell: bash
        run: |
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "Would pull ghcr.io/${OWNER}/fx-app-spring:latest on the staging host"